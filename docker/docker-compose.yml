version: '3.9'
services:
  crmy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://crmy:crmy@db:5432/crmy
      JWT_SECRET: change-me-in-production
      # First-run: set these to auto-create the initial admin account.
      # Remove after first boot or use a secrets manager.
      # CRMY_ADMIN_EMAIL: admin@yourcompany.com
      # CRMY_ADMIN_PASSWORD: choose-a-strong-password
      # CRMY_ADMIN_NAME: Admin
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crmy
      POSTGRES_PASSWORD: crmy
      POSTGRES_DB: crmy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "crmy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
