services:
  crmy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://crmy:crmy@db:5432/crmy
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET before starting. Generate one with: openssl rand -hex 32}
      # First-run: set these to auto-create the initial admin account.
      # Remove after first boot or use a secrets manager.
      # CRMY_ADMIN_EMAIL: admin@yourcompany.com
      # CRMY_ADMIN_PASSWORD: choose-a-strong-password
      # CRMY_ADMIN_NAME: Admin
      # Seed demo data on container start (set to "true" to enable)
      # CRMY_SEED_DEMO: "true"
      # pgvector semantic search (requires pgvector/pgvector:pg16 image — already set above)
      # ENABLE_PGVECTOR: "true"
      # EMBEDDING_PROVIDER: openai
      # EMBEDDING_API_KEY: sk-...
      # EMBEDDING_MODEL: text-embedding-3-small
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: crmy
      POSTGRES_PASSWORD: crmy
      POSTGRES_DB: crmy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "crmy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
